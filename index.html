<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GwadaDegen | Elite Orange Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff8c00; 
            --accent-glow: rgba(255, 140, 0, 0.4);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --neon-white: #ffffff;
            --neon-white-glow: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- FOND ÉTOILÉ --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top, #0d0d0d 0%, #050505 100%);
        }

        .stars {
            position: absolute;
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 15vw 10vh #fff, 35vw 45vh #fff, 80vw 15vh #fff, 20vw 85vh #fff, 50vw 30vh #fff, 65vw 60vh #fff, 90vw 50vh #fff, 75vw 90vh #fff, 40vw 15vh #fff;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* --- LAYOUT --- */
        .container {
            width: 100%;
            max-width: 580px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
        }

        /* --- HEADER --- */
        .profile-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            padding: 3px;
            margin-bottom: 16px;
            box-shadow: 0 0 25px var(--accent-glow);
            object-fit: cover;
            background: #000;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }
