<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GwadaDegen | Elite Orange Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff8c00; 
            --accent-glow: rgba(255, 140, 0, 0.4);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --neon-white: #ffffff;
            --neon-white-glow: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- FOND ÉTOILÉ --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top, #0d0d0d 0%, #050505 100%);
        }

        .stars {
            position: absolute;
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 15vw 10vh #fff, 35vw 45vh #fff, 80vw 15vh #fff, 20vw 85vh #fff, 50vw 30vh #fff, 65vw 60vh #fff, 90vw 50vh #fff, 75vw 90vh #fff, 40vw 15vh #fff;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* --- LAYOUT --- */
        .container {
            width: 100%;
            max-width: 580px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
        }

        /* --- HEADER --- */
        .profile-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            padding: 3px;
            margin-bottom: 16px;
            box-shadow: 0 0 25px var(--accent-glow);
            object-fit: cover; /* Assure que l'image ne soit pas déformée */
            background: #000;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- BOUTONS / PANNEAUX --- */
        .link-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }

        .link-card:hover {
            background: rgba(255, 140, 0, 0.08);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-content i {
            font-size: 20px;
            color: var(--accent-color);
            width: 24px;
            text-align: center;
        }

        .link-text {
            font-weight: 600;
            font-size: 15px;
        }

        .chevron {
            color: var(--text-dim);
            font-size: 12px;
        }

        /* --- SPECIAL : RAZED --- */
        .razed-card {
            background: linear-gradient(90deg, rgba(255, 140, 0, 0.15), transparent);
            border: 1px solid rgba(255, 140, 0, 0.3);
            flex-direction: column;
            gap: 15px;
            padding: 25px;
            text-align: center;
        }

        .promo-badge {
            background: var(--accent-color);
            color: #000;
            font-weight: 800;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 20px;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        /* --- MODAL & ROUE --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            align-items: center; justify-content: center;
        }

        .modal-box {
            background: #0a0a0a;
            border: 1px solid var(--accent-color);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .wheel-container {
            position: relative;
            width: 260px; height: 260px;
            margin: 25px auto;
        }

        .wheel-arrow {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 14px solid transparent; border-right: 14px solid transparent;
            border-top: 28px solid var(--neon-white); 
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--neon-white-glow));
        }

        #wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background: conic-gradient(var(--accent-color) 0 60deg, #111 60deg 120deg, #222 120deg 180deg, var(--accent-color) 180deg 240deg, #111 240deg 300deg, #222 300deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .spin-button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: 0.2s;
        }

        .spin-button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
    </div>

    <div class="container">
        <div class="profile-section">
            <img src="https://i.ibb.co/fYbZf0td/a2bec7b9-06ae-11f1-ae5e-1abaa1b7fe23.png" alt="GwadaDegen" class="profile-img">
            <h1>GwadaDegen</h1>
            <div class="subtitle">Elite Degen Hub</div>
        </div>

        <a href="https://www.razed.com/signup/?raf=gwadadegen" target="_blank" class="link-card razed-card">
            <span style="font-size: 12px; font-weight: 700; opacity: 0.7; letter-spacing: 1px;">PARTENAIRE OFFICIEL</span>
            <div class="promo-badge">GWADADEGEN</div>
            <span style="font-size: 14px; font-weight: 600; color: var(--accent-color);">CLIQUE ICI POUR PROFITER DE L'OFFRE</span>
        </a>

        <div class="link-card" id="openWheel" style="cursor: pointer;">
            <div class="link-content">
                <i class="fas fa-dharmachakra"></i>
                <span class="link-text">TEST TA CHANCE</span>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </div>

        <a href="https://dlive.tv/GwadaDegen" target="_blank" class="link-card">
            <div class="link-content">
                <i class="fas fa-video"></i>
                <span class="link-text">Live sur DLive</span>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <div class="social-grid">
            <a href="https://www.instagram.com/gwadadegen" target="_blank" class="link-card">
                <div class="link-content">
                    <i class="fab fa-instagram" style="color: #E1306C;"></i>
                    <span class="link-text">Insta</span>
                </div>
            </a>
            <a href="https://discord.gg/uCZ4Dcq7rp" target="_blank" class="link-card">
                <div class="link-content">
                    <i class="fab fa-discord" style="color: #5865F2;"></i>
                    <span class="link-text">Discord</span>
                </div>
            </a>
        </div>
    </div>

    <div id="wheelModal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom: 5px;">Bonne chance !</h2>
            <p style="font-size: 13px; color: var(--text-dim);">Tente de gagner un lot exclusif</p>
            <div class="wheel-container">
                <div class="wheel-arrow"></div>
                <div id="wheel"></div>
            </div>
            <button id="spinBtn" class="spin-button">Lancer le Spin</button>
            <p onclick="closeModal()" style="margin-top: 20px; cursor: pointer; font-size: 12px; opacity: 0.5; text-decoration: underline;">Fermer</p>
        </div>
    </div>

    <script>
        const modal = document.getElementById('wheelModal');
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        let currentRotation = 0;
        let isSpinning = false;

        document.getElementById('openWheel').onclick = () => modal.style.display = 'flex';
        function closeModal() { if(!isSpinning) modal.style.display = 'none'; }

        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            const extraDegrees = Math.floor(Math.random() * 360) + 2160; 
            currentRotation += extraDegrees;
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => { 
                isSpinning = false;
                alert("Spin terminé ! Envoie la capture sur Discord !"); 
            }, 4000);
        };

        window.onclick = (e) => { if (e.target == modal) closeModal(); }
    </script>
</body>
</html>
